<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>YouTube Learning Curator</title>
  <style>
    :root {
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;

      --font-size-label: 14px;
      --font-size-body: 16px;
      --font-size-heading: 20px;
      --font-size-display: 28px;
      --font-weight-regular: 400;
      --font-weight-semibold: 600;
      --line-height-body: 1.5;
      --line-height-label: 1.4;
      --line-height-heading: 1.2;
      --line-height-display: 1.15;

      --color-bg: #0f0f0f;
      --color-surface: #1a1a1a;
      --color-surface-raised: #242424;
      --color-text: #f0f0f0;
      --color-text-muted: #a0a0a0;
      --color-accent: #3b82f6;
      --color-success: #22c55e;
      --color-destructive: #ef4444;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: var(--font-size-body);
      line-height: var(--line-height-body);
      margin: 0;
      padding: 0;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: var(--space-lg);
      padding-top: 48px;
    }

    h1 {
      font-size: var(--font-size-display);
      font-weight: var(--font-weight-semibold);
      line-height: var(--line-height-display);
      color: var(--color-text);
      margin: 0 0 var(--space-xs) 0;
    }

    .subtitle {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      margin: 0 0 var(--space-xl) 0;
    }

    /* ── Search form ─────────────────────────────────────────────────────── */

    #search-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
    }

    #subject-input {
      background: var(--color-surface);
      border: 1px solid var(--color-surface-raised);
      color: var(--color-text);
      padding: var(--space-sm) var(--space-md);
      border-radius: 6px;
      font-size: var(--font-size-body);
      font-family: inherit;
      width: 100%;
    }

    #subject-input::placeholder {
      color: var(--color-text-muted);
    }

    #subject-input:focus {
      border-color: var(--color-accent);
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    #subject-input:disabled,
    #skill-level:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #skill-level {
      background: var(--color-surface);
      border: 1px solid var(--color-surface-raised);
      color: var(--color-text);
      padding: var(--space-sm) var(--space-md);
      border-radius: 6px;
      font-size: var(--font-size-body);
      font-family: inherit;
      width: 100%;
      appearance: auto;
    }

    #skill-level:focus {
      border-color: var(--color-accent);
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    #btn-generate {
      background: var(--color-accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: var(--font-size-body);
      font-family: inherit;
      cursor: pointer;
      width: 100%;
    }

    #btn-generate:hover {
      background: #2563eb;
    }

    #btn-generate:active {
      background: #1d4ed8;
    }

    #btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #btn-generate:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ── Shared text utilities ───────────────────────────────────────────── */

    .section-label {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      margin: 0 0 var(--space-xs) 0;
    }

    .section-heading {
      font-size: var(--font-size-heading);
      font-weight: var(--font-weight-semibold);
      line-height: var(--line-height-heading);
      margin: 0 0 var(--space-sm) 0;
    }

    .muted-text {
      font-size: var(--font-size-body);
      color: var(--color-text-muted);
    }

    /* ── Recent searches ─────────────────────────────────────────────────── */

    #recent-searches {
      margin-bottom: var(--space-lg);
    }

    #recent-pills {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }

    .pill {
      background: var(--color-surface-raised);
      color: var(--color-text-muted);
      border: none;
      border-radius: 100px;
      padding: var(--space-xs) 12px;
      font-size: var(--font-size-label);
      font-family: inherit;
      cursor: pointer;
    }

    .pill:hover {
      background: #333;
      color: var(--color-text);
    }

    /* ── History panel ───────────────────────────────────────────────────── */

    #history-panel {
      margin-bottom: var(--space-xl);
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-radius: 6px;
      cursor: pointer;
      border-left: 3px solid transparent;
    }

    .history-item:hover {
      background: var(--color-surface);
    }

    .history-item.active {
      border-left-color: var(--color-accent);
      background: var(--color-surface-raised);
    }

    .history-title {
      flex: 1;
      font-size: var(--font-size-body);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      flex-shrink: 0;
    }

    .skill-badge {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      background: var(--color-surface);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ── Pipeline loading state ──────────────────────────────────────────── */

    #pipeline-section {
      margin-bottom: var(--space-xl);
    }

    .pipeline-step {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-xs) 0;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--color-text-muted);
    }

    .dot-active {
      background: var(--color-accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dot-complete {
      background: var(--color-success);
    }

    .dot-error {
      background: var(--color-destructive);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .step-label {
      font-size: var(--font-size-body);
      color: var(--color-text);
    }

    /* ── Progress bar ────────────────────────────────────────────────────── */

    .progress-track {
      background: var(--color-surface-raised);
      height: 4px;
      border-radius: 2px;
      margin-top: var(--space-md);
      overflow: hidden;
    }

    #progress-fill {
      background: var(--color-accent);
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 300ms ease;
    }

    /* ── Error state ─────────────────────────────────────────────────────── */

    .error-text {
      color: var(--color-destructive);
      font-size: var(--font-size-body);
    }

    /* ── Course section ──────────────────────────────────────────────────── */

    #course-section {
      margin-top: var(--space-lg);
    }

    .course-header {
      margin-bottom: var(--space-xl);
    }

    .course-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-md);
      flex-wrap: wrap;
    }

    .course-title {
      font-size: var(--font-size-display);
      font-weight: var(--font-weight-semibold);
      line-height: var(--line-height-display);
      margin: 0;
    }

    .btn-export {
      background: transparent;
      border: 1px solid var(--color-accent);
      color: var(--color-accent);
      border-radius: 6px;
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-body);
      font-family: inherit;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-export:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .btn-export:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .course-overview {
      font-size: var(--font-size-body);
      color: var(--color-text);
      margin: var(--space-md) 0;
    }

    .prereq-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
      align-items: center;
    }

    .prereq-label {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      font-weight: var(--font-weight-semibold);
    }

    .prereq-badge {
      background: var(--color-surface);
      color: var(--color-text);
      padding: 2px 10px;
      border-radius: 4px;
      font-size: var(--font-size-label);
    }

    .watch-time {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
    }

    /* ── Module cards ────────────────────────────────────────────────────── */

    .module-card {
      background: var(--color-surface);
      border-radius: 8px;
      margin-bottom: var(--space-lg);
      overflow: hidden;
    }

    .module-card > summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-md);
      cursor: pointer;
      list-style: none;
      font-size: var(--font-size-heading);
      font-weight: var(--font-weight-semibold);
      line-height: var(--line-height-heading);
    }

    .module-card > summary::-webkit-details-marker {
      display: none;
    }

    .module-card > summary::marker {
      display: none;
      content: '';
    }

    .module-count {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      font-weight: var(--font-weight-regular);
    }

    .module-body {
      padding: 0 var(--space-md) var(--space-md);
    }

    .module-description {
      font-size: var(--font-size-body);
      color: var(--color-text-muted);
      margin: 0 0 var(--space-md) 0;
    }

    /* ── Video cards ─────────────────────────────────────────────────────── */

    .video-card {
      display: flex;
      gap: var(--space-md);
      padding: var(--space-md) 0;
      border-top: 1px solid var(--color-surface-raised);
    }

    .video-thumb {
      flex-shrink: 0;
    }

    .video-thumb img {
      width: 120px;
      height: 68px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
    }

    .video-thumb a:hover img {
      opacity: 0.85;
    }

    .video-content {
      flex: 1;
      min-width: 0;
    }

    .video-title {
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-semibold);
      margin: 0 0 var(--space-xs) 0;
    }

    .video-meta {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      margin: 0 0 var(--space-xs) 0;
    }

    .badge-row {
      display: flex;
      gap: var(--space-sm);
      align-items: center;
      margin-bottom: var(--space-xs);
      flex-wrap: wrap;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 28px;
      border-radius: 100px;
      font-size: var(--font-size-label);
      font-weight: var(--font-weight-semibold);
      color: white;
      padding: 0 var(--space-sm);
    }

    .outdated-badge {
      background: #f59e0b;
      color: #0f0f0f;
      border-radius: 4px;
      padding: 2px var(--space-sm);
      font-size: var(--font-size-label);
      font-weight: var(--font-weight-semibold);
    }

    .video-blurb {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      margin: var(--space-xs) 0;
    }

    /* ── Questions accordion ─────────────────────────────────────────────── */

    .questions-accordion {
      margin-top: var(--space-sm);
    }

    .questions-accordion > summary {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      cursor: pointer;
      padding: var(--space-xs) 0;
    }

    .question-item {
      margin-bottom: var(--space-md);
    }

    .question-label {
      font-size: var(--font-size-label);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text);
      margin-bottom: var(--space-xs);
    }

    .question-textarea {
      background: var(--color-surface);
      border: 1px solid var(--color-surface-raised);
      color: var(--color-text);
      border-radius: 4px;
      padding: var(--space-sm);
      font-size: var(--font-size-body);
      font-family: inherit;
      min-height: 72px;
      resize: vertical;
      width: 100%;
    }

    .question-textarea::placeholder {
      color: var(--color-text-muted);
    }

    .question-textarea:focus {
      border-color: var(--color-accent);
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .hint-text {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      margin-top: var(--space-xs);
    }

    .hint-label {
      font-weight: var(--font-weight-semibold);
    }

    .btn-hints {
      background: transparent;
      border: 1px solid var(--color-accent);
      color: var(--color-accent);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: var(--font-size-label);
      font-family: inherit;
      cursor: pointer;
      margin-top: var(--space-sm);
    }

    .btn-hints:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .btn-hints:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-hints:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ── Hint error + retry ──────────────────────────────────────────────── */

    .hint-error {
      font-size: var(--font-size-label);
      color: var(--color-destructive);
      margin-top: var(--space-sm);
    }

    .btn-retry-hint {
      background: transparent;
      border: 1px solid var(--color-accent);
      color: var(--color-accent);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: var(--font-size-label);
      font-family: inherit;
      cursor: pointer;
      margin-left: var(--space-sm);
    }

    .btn-retry-hint:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .btn-retry-hint:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ── Watched checkbox row ────────────────────────────────────────────── */

    .watched-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-top: var(--space-sm);
      padding: var(--space-xs) 0;
      min-height: 44px;
    }

    .watched-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--color-success);
      cursor: pointer;
    }

    .watched-row label {
      font-size: var(--font-size-label);
      color: var(--color-text-muted);
      cursor: pointer;
    }

    /* ── Module connecting question ──────────────────────────────────────── */

    .connecting-question {
      padding: var(--space-md) 0 0;
      border-top: 1px solid var(--color-surface-raised);
      margin-top: var(--space-md);
    }

    .connecting-question-label {
      font-size: var(--font-size-label);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-muted);
      margin: 0 0 var(--space-xs) 0;
    }

    .connecting-question-text {
      font-size: var(--font-size-body);
      color: var(--color-text);
      margin: 0;
    }

    /* ── Empty state ─────────────────────────────────────────────────────── */

    .empty-state-heading {
      font-size: var(--font-size-heading);
      font-weight: var(--font-weight-semibold);
      line-height: var(--line-height-heading);
      color: var(--color-text);
      margin: 0 0 var(--space-xs) 0;
    }

    .empty-state-body {
      font-size: var(--font-size-body);
      color: var(--color-text-muted);
      margin: 0;
    }

    /* ── Responsive ──────────────────────────────────────────────────────── */

    @media (max-width: 480px) {
      .video-card { flex-direction: column; }
      .course-title-row { flex-direction: column; }
      .btn-export { width: 100%; text-align: center; }
      #btn-generate { width: 100%; }
    }

    @media (min-width: 481px) {
      #search-form { flex-direction: row; flex-wrap: wrap; }
      #subject-input { flex: 1; }
      #skill-level { width: auto; }
      #btn-generate { width: auto; }
    }
  </style>
</head>
<body>
  <header id="app-header" style="
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-surface-raised);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--space-md);
    z-index: 1000;
  ">
    <span style="font-size: var(--font-size-label); color: var(--color-text-muted);">YouTube Learning Curator</span>
    <div id="clerk-user-button"></div>
  </header>
  <main>
    <h1>YouTube Learning Curator</h1>
    <p class="subtitle">Curated YouTube courses powered by AI</p>

    <!-- 1. Search form (always visible) -->
    <section id="search-form">
      <input
        id="subject-input"
        type="text"
        placeholder="Enter a subject to learn..."
        maxlength="200"
        autocomplete="off"
      >
      <select id="skill-level">
        <option value="all levels" selected>All Levels</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
      <button id="btn-generate" type="button">Generate course</button>
    </section>

    <!-- 2. Recent searches (visible when non-empty) -->
    <section id="recent-searches" hidden>
      <p class="section-label">Recent searches</p>
      <div id="recent-pills"></div>
    </section>

    <!-- 3. History panel (visible when non-empty) -->
    <section id="history-panel" hidden>
      <h2 class="section-heading">Recent courses</h2>
      <div id="history-list"></div>
      <p id="history-empty" class="muted-text">No saved courses yet.</p>
    </section>

    <!-- 4. Pipeline loading state (visible during generation only) -->
    <section id="pipeline-section" hidden>
      <div id="pipeline-steps"></div>
      <div class="progress-track">
        <div id="progress-fill"></div>
      </div>
    </section>

    <!-- 5. Error state (visible on pipeline error only) -->
    <section id="error-section" hidden>
      <p id="error-message" class="error-text"></p>
    </section>

    <!-- 6. Course view (visible after generation completes) -->
    <section id="course-section" hidden>
      <div id="course-header"></div>
      <div id="course-modules"></div>
    </section>

    <!-- 7. Empty state (visible on initial load, no course yet) -->
    <section id="empty-state">
      <h2 class="empty-state-heading">What do you want to learn?</h2>
      <p class="empty-state-body">Enter a subject above and select your skill level to generate a curated YouTube course.</p>
    </section>
  </main>

  <script>
    'use strict';

    document.addEventListener('DOMContentLoaded', () => {

      // ─── Pure Logic Functions ──────────────────────────────────────────────

      function slugify(title) {
        return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      }

      function formatDuration(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        return `${m}:${String(s).padStart(2, '0')}`;
      }

      function scoreBadgeColor(score) {
        if (score >= 80) return '#22c55e';
        if (score >= 60) return '#3b82f6';
        if (score >= 40) return '#f59e0b';
        return '#a0a0a0';
      }

      function relativeTime(isoString) {
        const diff = Date.now() - new Date(isoString).getTime();
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        if (days > 0) return `${days} day${days > 1 ? 's' : ''} ago`;
        if (hours > 0) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
        if (minutes > 0) return `${minutes} minute${minutes > 1 ? 's' : ''} ago`;
        return 'just now';
      }

      function updateRecentSearches(searches, newSubject) {
        const deduped = searches.filter((s) => s !== newSubject);
        deduped.unshift(newSubject);
        return deduped.slice(0, 5);
      }

      function buildMarkdown(course, subject, skillLevel) {
        const lines = [];
        lines.push(`# ${course.title}`);
        lines.push('');
        lines.push(`**Subject:** ${subject} | **Level:** ${skillLevel} | **Watch time:** ${course.totalWatchTime}`);
        lines.push('');
        lines.push('## Prerequisites');
        for (const prereq of (course.prerequisites || [])) {
          lines.push(`- ${prereq}`);
        }
        lines.push('');
        lines.push('## Overview');
        lines.push(course.overview);
        lines.push('');
        lines.push('---');

        for (let mi = 0; mi < course.modules.length; mi++) {
          const mod = course.modules[mi];
          lines.push('');
          lines.push(`## Module ${mi + 1}: ${mod.title}`);
          lines.push('');
          lines.push(mod.description);

          for (const video of mod.videos) {
            lines.push('');
            lines.push(`### ${video.title}`);
            lines.push(`- **Channel:** ${video.channelTitle}`);
            lines.push(`- **Duration:** ${formatDuration(video.durationSeconds)}`);
            lines.push(`- **Link:** ${video.url}`);
            lines.push(`- **Why:** ${video.blurb}`);
            if (video.outdated) {
              lines.push('');
              lines.push('> Note: This video may contain outdated information.');
            }
            lines.push('');
            lines.push('**Questions:**');
            video.questions.forEach((q, i) => {
              const label = q.type.charAt(0).toUpperCase() + q.type.slice(1);
              lines.push(`${i + 1}. (${label}) ${q.text}`);
            });
          }

          lines.push('');
          lines.push(`**Module question:** ${mod.connectingQuestion}`);
          lines.push('');
          lines.push('---');
        }

        return lines.join('\n');
      }

      // ─── Section State Management ──────────────────────────────────────────

      const CONTENT_SECTIONS = ['pipeline-section', 'error-section', 'course-section', 'empty-state'];

      function showContentSection(id) {
        for (const sectionId of CONTENT_SECTIONS) {
          document.getElementById(sectionId).hidden = (sectionId !== id);
        }
      }

      // ─── Pipeline Step Configuration ───────────────────────────────────────

      const STEP_LABELS = {
        query_generated:    'Generating search queries',
        videos_fetched:     'Searching YouTube',
        scored:             'Scoring videos',
        transcripts_fetched:'Fetching transcripts',
        course_assembled:   'Building your course',
      };
      const STEP_ORDER = ['query_generated', 'videos_fetched', 'scored', 'transcripts_fetched', 'course_assembled'];

      function initPipelineSteps() {
        const container = document.getElementById('pipeline-steps');
        container.innerHTML = '';
        for (const eventName of STEP_ORDER) {
          const step = document.createElement('div');
          step.className = 'pipeline-step';
          step.dataset.step = eventName;

          const dot = document.createElement('span');
          dot.className = 'dot';

          const label = document.createElement('span');
          label.className = 'step-label';
          label.textContent = STEP_LABELS[eventName];

          step.appendChild(dot);
          step.appendChild(label);
          container.appendChild(step);
        }

        // Mark first step as active immediately
        const firstStep = container.querySelector('[data-step="query_generated"]');
        if (firstStep) firstStep.querySelector('.dot').classList.add('dot-active');

        // Reset progress bar
        document.getElementById('progress-fill').style.width = '0%';
      }

      function updatePipelineStep(eventName) {
        const stepIndex = STEP_ORDER.indexOf(eventName);
        if (stepIndex === -1) return;

        const container = document.getElementById('pipeline-steps');

        // Mark current step as complete
        const currentStep = container.querySelector(`[data-step="${eventName}"]`);
        if (currentStep) {
          const dot = currentStep.querySelector('.dot');
          dot.classList.remove('dot-active');
          dot.classList.add('dot-complete');
        }

        // Mark next step as active (if any)
        if (stepIndex + 1 < STEP_ORDER.length) {
          const nextEventName = STEP_ORDER[stepIndex + 1];
          const nextStep = container.querySelector(`[data-step="${nextEventName}"]`);
          if (nextStep) {
            nextStep.querySelector('.dot').classList.add('dot-active');
          }
        }

        // Update progress bar
        const progressFill = document.getElementById('progress-fill');
        progressFill.style.width = ((stepIndex + 1) / 5 * 100) + '%';
      }

      // ─── Form Helpers ──────────────────────────────────────────────────────

      function disableForm() {
        const btn = document.getElementById('btn-generate');
        btn.textContent = 'Generating...';
        btn.disabled = true;
        document.getElementById('subject-input').disabled = true;
        document.getElementById('skill-level').disabled = true;
      }

      function enableForm() {
        const btn = document.getElementById('btn-generate');
        btn.textContent = 'Generate course';
        btn.disabled = false;
        document.getElementById('subject-input').disabled = false;
        document.getElementById('skill-level').disabled = false;
      }

      // ─── Error Display ─────────────────────────────────────────────────────

      function showError(message) {
        showContentSection('error-section');
        document.getElementById('error-message').textContent = message;
      }

      function resolveErrorMessage(data) {
        if (data && data.code === 'QUOTA_EXCEEDED') {
          return 'YouTube API quota exceeded. Try again after midnight Pacific time.';
        }
        return 'Something went wrong generating your course. Check the server logs.';
      }

      // ─── Recent Searches ───────────────────────────────────────────────────

      function loadRecentSearches() {
        try {
          return JSON.parse(localStorage.getItem('ylc_searches') || '[]');
        } catch (_) {
          return [];
        }
      }

      function renderRecentSearches(searches) {
        const section = document.getElementById('recent-searches');
        const pillsContainer = document.getElementById('recent-pills');
        pillsContainer.innerHTML = '';

        if (searches.length === 0) {
          section.hidden = true;
          return;
        }

        section.hidden = false;
        for (const term of searches) {
          const pill = document.createElement('button');
          pill.className = 'pill';
          pill.textContent = term;
          pill.addEventListener('click', () => {
            document.getElementById('subject-input').value = term;
          });
          pillsContainer.appendChild(pill);
        }
      }

      // ─── History Persistence (D-06, D-07: server-backed) ───────────────────

      // Module-level cache of the most recent /api/courses response.
      // Populated by renderHistory; read by restoreCourse.
      let currentHistory = [];

      async function fetchCourseHistory() {
        try {
          const res = await fetch('/api/courses');
          if (!res.ok) return [];
          const body = await res.json();
          return body.courses || [];
        } catch (_) {
          return [];
        }
      }

      function renderHistory(history) {
        currentHistory = history;

        const panel = document.getElementById('history-panel');
        const list = document.getElementById('history-list');
        const empty = document.getElementById('history-empty');

        if (history.length === 0) {
          panel.hidden = true;
          return;
        }

        panel.hidden = false;
        empty.hidden = true;
        list.innerHTML = '';

        history.forEach((entry, i) => {
          const item = document.createElement('div');
          item.className = 'history-item';
          item.dataset.index = i;

          const titleSpan = document.createElement('span');
          titleSpan.className = 'history-title';
          titleSpan.textContent = entry.course.title;

          const badgeSpan = document.createElement('span');
          badgeSpan.className = 'skill-badge';
          badgeSpan.textContent = entry.skill_level;

          const metaSpan = document.createElement('span');
          metaSpan.className = 'history-meta';
          metaSpan.textContent = relativeTime(entry.created_at);

          item.appendChild(titleSpan);
          item.appendChild(badgeSpan);
          item.appendChild(metaSpan);

          item.addEventListener('click', () => restoreCourse(i));

          list.appendChild(item);
        });
      }

      function restoreCourse(index) {
        const entry = currentHistory[index];
        if (!entry) return;

        currentSubject = entry.topic;
        currentSkillLevel = entry.skill_level;

        renderCourse(entry.course, entry.topic, entry.skill_level);

        // Update active state on history items
        const items = document.querySelectorAll('.history-item');
        items.forEach((item, i) => {
          if (i === index) {
            item.classList.add('active');
          } else {
            item.classList.remove('active');
          }
        });

        document.getElementById('course-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      // ─── Export ────────────────────────────────────────────────────────────

      function exportCourse(course, subject, skillLevel) {
        const md = buildMarkdown(course, subject, skillLevel);
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = slugify(course.title) + '.md';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      // ── Hint localStorage helpers ─────────────────────────────────────────

      const HINTS_KEY = 'ylc_hints';

      function persistHints(videoId, hints) {
        try {
          const stored = JSON.parse(localStorage.getItem(HINTS_KEY) || '{}');
          stored[videoId] = hints;
          localStorage.setItem(HINTS_KEY, JSON.stringify(stored));
        } catch (_) { /* best-effort */ }
      }

      function loadHints(videoId) {
        try {
          const stored = JSON.parse(localStorage.getItem(HINTS_KEY) || '{}');
          return stored[videoId] || null;
        } catch (_) {
          return null;
        }
      }

      // ── Hint DOM helpers ──────────────────────────────────────────────────

      function renderHints(videoId, hints, questionsContainer) {
        const hintEls = questionsContainer.querySelectorAll('.hint-text[data-video-id="' + videoId + '"]');
        hintEls.forEach(function(el, i) {
          if (hints[i]) {
            el.innerHTML = '';
            const label = document.createElement('span');
            label.className = 'hint-label';
            label.textContent = 'Thinking point: ';
            el.appendChild(label);
            el.appendChild(document.createTextNode(hints[i]));
            el.hidden = false;
          }
        });
      }

      function showHintError(container, retryFn) {
        clearHintError(container);
        const err = document.createElement('p');
        err.className = 'hint-error';
        err.dataset.hintError = 'true';
        err.textContent = 'Could not load hints. ';
        const retryBtn = document.createElement('button');
        retryBtn.className = 'btn-retry-hint';
        retryBtn.textContent = 'Try again';
        retryBtn.addEventListener('click', retryFn);
        err.appendChild(retryBtn);
        container.appendChild(err);
      }

      function clearHintError(container) {
        const existing = container.querySelector('[data-hint-error]');
        if (existing) existing.remove();
      }

      // ── Hint fetch ────────────────────────────────────────────────────────

      async function fetchHints(video, btn, container) {
        // Build transcriptSnippet from assembled course data (first 500 words)
        const rawText = video.transcriptSnippet || '';
        const transcriptSnippet = rawText.split(/\s+/).filter(Boolean).slice(0, 500).join(' ');

        // Loading state — scoped to this button only
        btn.disabled = true;
        btn.textContent = 'Loading hints...';
        clearHintError(container);

        try {
          const res = await fetch('/api/hints', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              videoId: video.videoId,
              videoTitle: video.title,
              questions: video.questions.map(function(q) { return q.text; }),
              transcriptSnippet: transcriptSnippet,
            }),
          });

          if (!res.ok) {
            throw new Error('Server error ' + res.status);
          }

          const data = await res.json();
          renderHints(video.videoId, data.hints, container);
          persistHints(video.videoId, data.hints);
          btn.hidden = true;
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Reveal thinking points';
          showHintError(container, function() { fetchHints(video, btn, container); });
        }
      }

      // ─── Course Rendering ──────────────────────────────────────────────────

      function capitalize(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
      }

      function renderCourse(course, subject, skillLevel) {
        showContentSection('course-section');

        // Build course header
        const courseHeader = document.getElementById('course-header');
        courseHeader.innerHTML = '';

        // Title row with export button
        const titleRow = document.createElement('div');
        titleRow.className = 'course-title-row';

        const titleEl = document.createElement('h2');
        titleEl.className = 'course-title';
        titleEl.textContent = course.title;

        const exportBtn = document.createElement('button');
        exportBtn.className = 'btn-export';
        exportBtn.id = 'btn-export';
        exportBtn.textContent = 'Export course';
        exportBtn.addEventListener('click', () => exportCourse(course, subject, skillLevel));

        titleRow.appendChild(titleEl);
        titleRow.appendChild(exportBtn);
        courseHeader.appendChild(titleRow);

        // Overview
        const overview = document.createElement('p');
        overview.className = 'course-overview';
        overview.textContent = course.overview;
        courseHeader.appendChild(overview);

        // Prerequisites
        if (course.prerequisites && course.prerequisites.length > 0) {
          const prereqRow = document.createElement('div');
          prereqRow.className = 'prereq-row';

          const prereqLabel = document.createElement('span');
          prereqLabel.className = 'prereq-label';
          prereqLabel.textContent = 'Prerequisites:';
          prereqRow.appendChild(prereqLabel);

          for (const prereq of course.prerequisites) {
            const badge = document.createElement('span');
            badge.className = 'prereq-badge';
            badge.textContent = prereq;
            prereqRow.appendChild(badge);
          }

          courseHeader.appendChild(prereqRow);
        }

        // Watch time
        const watchTime = document.createElement('p');
        watchTime.className = 'watch-time';
        watchTime.textContent = 'Estimated watch time: ' + course.totalWatchTime;
        courseHeader.appendChild(watchTime);

        // Build modules
        const modulesContainer = document.getElementById('course-modules');
        modulesContainer.innerHTML = '';

        course.modules.forEach((mod, mi) => {
          const details = document.createElement('details');
          details.className = 'module-card';
          if (mi === 0) details.setAttribute('open', '');

          // Summary
          const summary = document.createElement('summary');

          const modTitle = document.createElement('span');
          modTitle.className = 'module-title';
          modTitle.textContent = 'Module ' + (mi + 1) + ': ' + mod.title;

          const modCount = document.createElement('span');
          modCount.className = 'module-count';
          modCount.textContent = mod.videos.length + ' videos';

          summary.appendChild(modTitle);
          summary.appendChild(modCount);
          details.appendChild(summary);

          // Module body
          const moduleBody = document.createElement('div');
          moduleBody.className = 'module-body';

          // Module description
          const modDesc = document.createElement('p');
          modDesc.className = 'module-description';
          modDesc.textContent = mod.description;
          moduleBody.appendChild(modDesc);

          // Video cards
          mod.videos.forEach((video) => {
            const videoCard = document.createElement('div');
            videoCard.className = 'video-card';

            // Thumbnail
            const thumbDiv = document.createElement('div');
            thumbDiv.className = 'video-thumb';

            const thumbLink = document.createElement('a');
            thumbLink.href = video.url;
            thumbLink.target = '_blank';
            thumbLink.rel = 'noopener';

            const img = document.createElement('img');
            img.src = video.thumbnail;
            img.alt = video.title + ' — YouTube thumbnail';
            img.width = 120;
            img.height = 68;

            thumbLink.appendChild(img);
            thumbDiv.appendChild(thumbLink);
            videoCard.appendChild(thumbDiv);

            // Content column
            const contentDiv = document.createElement('div');
            contentDiv.className = 'video-content';

            // Title
            const videoTitle = document.createElement('p');
            videoTitle.className = 'video-title';
            videoTitle.textContent = video.title;
            contentDiv.appendChild(videoTitle);

            // Meta (channel · duration)
            const videoMeta = document.createElement('p');
            videoMeta.className = 'video-meta';
            videoMeta.textContent = video.channelTitle + ' · ' + formatDuration(video.durationSeconds);
            contentDiv.appendChild(videoMeta);

            // Badge row (score + outdated)
            const badgeRow = document.createElement('div');
            badgeRow.className = 'badge-row';

            const scoreBadge = document.createElement('span');
            scoreBadge.className = 'score-badge';
            scoreBadge.textContent = video.score;
            scoreBadge.style.background = scoreBadgeColor(video.score);
            badgeRow.appendChild(scoreBadge);

            if (video.outdated) {
              const outdatedBadge = document.createElement('span');
              outdatedBadge.className = 'outdated-badge';
              outdatedBadge.textContent = 'May be outdated';
              badgeRow.appendChild(outdatedBadge);
            }

            contentDiv.appendChild(badgeRow);

            // Blurb
            const blurb = document.createElement('p');
            blurb.className = 'video-blurb';
            blurb.textContent = video.blurb;
            contentDiv.appendChild(blurb);

            // Questions accordion
            const questionsDetails = document.createElement('details');
            questionsDetails.className = 'questions-accordion';

            const questionsSummary = document.createElement('summary');
            questionsSummary.textContent = 'Comprehension questions (' + video.questions.length + ')';
            questionsDetails.appendChild(questionsSummary);

            video.questions.forEach((q, i) => {
              const questionItem = document.createElement('div');
              questionItem.className = 'question-item';

              const questionLabel = document.createElement('p');
              questionLabel.className = 'question-label';
              questionLabel.textContent = (i + 1) + '. (' + capitalize(q.type) + ') ' + q.text;
              questionItem.appendChild(questionLabel);

              const textarea = document.createElement('textarea');
              textarea.className = 'question-textarea';
              textarea.placeholder = 'Write your answer here...';
              questionItem.appendChild(textarea);

              const hintText = document.createElement('p');
              hintText.className = 'hint-text';
              hintText.dataset.videoId = video.videoId;
              hintText.dataset.questionIndex = i;
              hintText.hidden = true;
              questionItem.appendChild(hintText);

              questionsDetails.appendChild(questionItem);
            });

            // Reveal thinking points button (no-op stub — Phase 5 wires the API call)
            const hintsBtn = document.createElement('button');
            hintsBtn.className = 'btn-hints';
            hintsBtn.dataset.videoId = video.videoId;
            hintsBtn.textContent = 'Reveal thinking points';
            // Check for stored hints and restore immediately (reload restore path)
            const storedHints = loadHints(video.videoId);
            if (storedHints) {
              renderHints(video.videoId, storedHints, questionsDetails);
              hintsBtn.hidden = true;
            } else {
              hintsBtn.addEventListener('click', function() {
                fetchHints(video, hintsBtn, questionsDetails);
              });
            }
            questionsDetails.appendChild(hintsBtn);

            contentDiv.appendChild(questionsDetails);

            // Watched checkbox row — persists to ylc_watched flat map (global by videoId)
            const watchedRow = document.createElement('div');
            watchedRow.className = 'watched-row';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = 'watched-' + video.videoId;

            // Read current watched state at render time (D-01: global by videoId)
            const watched = JSON.parse(localStorage.getItem('ylc_watched') || '{}');
            checkbox.checked = !!watched[video.videoId];

            checkbox.addEventListener('change', () => {
              const w = JSON.parse(localStorage.getItem('ylc_watched') || '{}');
              if (checkbox.checked) {
                w[video.videoId] = true;
              } else {
                delete w[video.videoId];
              }
              try {
                localStorage.setItem('ylc_watched', JSON.stringify(w));
              } catch (_) { /* silent fail */ }
            });

            const checkboxLabel = document.createElement('label');
            checkboxLabel.htmlFor = 'watched-' + video.videoId;
            checkboxLabel.textContent = 'Mark as watched';

            watchedRow.appendChild(checkbox);
            watchedRow.appendChild(checkboxLabel);
            contentDiv.appendChild(watchedRow);

            videoCard.appendChild(contentDiv);
            moduleBody.appendChild(videoCard);
          });

          // Connecting question at bottom of module body
          const connectingQuestion = document.createElement('div');
          connectingQuestion.className = 'connecting-question';

          const connectingLabel = document.createElement('p');
          connectingLabel.className = 'connecting-question-label';
          connectingLabel.textContent = 'Module question';
          connectingQuestion.appendChild(connectingLabel);

          const connectingText = document.createElement('p');
          connectingText.className = 'connecting-question-text';
          connectingText.textContent = mod.connectingQuestion;
          connectingQuestion.appendChild(connectingText);

          moduleBody.appendChild(connectingQuestion);
          details.appendChild(moduleBody);
          modulesContainer.appendChild(details);
        });
      }

      // ─── Form Submit Handler ───────────────────────────────────────────────

      let es = null;
      let currentSubject = '';
      let currentSkillLevel = '';

      document.getElementById('btn-generate').addEventListener('click', () => {
        const subject = document.getElementById('subject-input').value.trim();
        if (!subject) return;

        const skillLevel = document.getElementById('skill-level').value;

        currentSubject = subject;
        currentSkillLevel = skillLevel;

        // Disable form during generation
        disableForm();

        // Clear previous course content (D-04)
        document.getElementById('course-modules').innerHTML = '';
        document.getElementById('course-header').innerHTML = '';

        // Show pipeline section and initialize steps
        showContentSection('pipeline-section');
        initPipelineSteps();

        // Update recent searches
        const searches = loadRecentSearches();
        const updatedSearches = updateRecentSearches(searches, subject);
        try {
          localStorage.setItem('ylc_searches', JSON.stringify(updatedSearches));
        } catch (_) {
          // Best-effort persistence
        }
        renderRecentSearches(updatedSearches);

        // Close any existing SSE connection
        if (es) {
          es.close();
          es = null;
        }

        // Open new SSE connection
        const url = '/api/course-stream?subject=' + encodeURIComponent(subject) + '&skill_level=' + encodeURIComponent(skillLevel);
        es = new EventSource(url);

        // Register handlers for each pipeline step event
        for (const eventName of STEP_ORDER) {
          es.addEventListener(eventName, (e) => {
            const data = JSON.parse(e.data);
            updatePipelineStep(eventName);

            if (eventName === 'course_assembled') {
              es.close();
              es = null;

              if (data.error === 'TOO_FEW_VIDEOS') {
                showError('Not enough high-quality videos found. Try a broader search term.');
              } else {
                renderCourse(data.course, subject, skillLevel);
                fetchCourseHistory().then(history => renderHistory(history));
              }

              enableForm();
            }
          });
        }

        // Named error event (server-sent pipeline error)
        es.addEventListener('error', (e) => {
          es.close();
          es = null;

          let data;
          try {
            data = JSON.parse(e.data);
          } catch (_) {
            data = null;
          }

          showError(resolveErrorMessage(data));
          enableForm();
        });

        // Native EventSource network error (connection lost)
        es.onerror = () => {
          if (es) {
            es.close();
            es = null;
          }
          showError('Something went wrong generating your course. Check the server logs.');
          enableForm();
        };
      });

      // ─── Initialization ────────────────────────────────────────────────────

      const initialSearches = loadRecentSearches();
      renderRecentSearches(initialSearches);

      fetchCourseHistory().then(history => renderHistory(history));

    });
  </script>
